<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep teal to rich emerald -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4f47;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <!-- Shine overlay gradient -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.12" />
    </linearGradient>
    <!-- Gold accent gradient for inner ring -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Letter S gradient -->
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccfbf1;stop-opacity:0.92" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <!-- Inner glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Clip for rounded octagon -->
    <clipPath id="octClip">
      <polygon points="
        156,40
        356,40
        472,156
        472,356
        356,472
        156,472
        40,356
        40,156
      "/>
    </clipPath>
  </defs>

  <!-- Outer subtle background circle (subtle depth ring) -->
  <circle cx="256" cy="256" r="248" fill="#0a3330" opacity="0.25"/>

  <!-- Main octagon body with drop shadow -->
  <polygon
    points="156,40 356,40 472,156 472,356 356,472 156,472 40,356 40,156"
    fill="url(#bgGrad)"
    filter="url(#shadow)"
  />

  <!-- Shine overlay on octagon -->
  <polygon
    points="156,40 356,40 472,156 472,356 356,472 156,472 40,356 40,156"
    fill="url(#shineGrad)"
  />

  <!-- Inner octagon border ring (gold accent) -->
  <polygon
    points="156,40 356,40 472,156 472,356 356,472 156,472 40,356 40,156"
    fill="none"
    stroke="url(#goldGrad)"
    stroke-width="4"
    opacity="0.6"
  />

  <!-- Inner octagon (slightly smaller, subtle border) -->
  <polygon
    points="170,68 342,68 444,170 444,342 342,444 170,444 68,342 68,170"
    fill="none"
    stroke="#ffffff"
    stroke-width="1.5"
    opacity="0.12"
  />

  <!-- Letter S — bold, geometric, centered -->
  <!-- Top arc of S -->
  <path
    d="M 192 190
       C 192 158, 216 138, 256 138
       C 296 138, 324 158, 324 196
       C 324 228, 302 246, 270 258
       L 242 268
       C 210 280, 186 300, 186 336
       C 186 374, 214 396, 256 396
       C 298 396, 326 374, 326 338"
    fill="none"
    stroke="url(#letterGrad)"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Decorative small coin/ring mark bottom right - subtle -->
  <circle cx="348" cy="352" r="22" fill="none" stroke="#fcd34d" stroke-width="3" opacity="0.45"/>
  <circle cx="348" cy="352" r="12" fill="#fcd34d" opacity="0.25"/>

  <!-- Top-left subtle geometric accent -->
  <line x1="148" y1="108" x2="178" y2="108" stroke="#ffffff" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="168" y2="120" stroke="#ffffff" stroke-width="2.5" opacity="0.12" stroke-linecap="round"/>
</svg>
